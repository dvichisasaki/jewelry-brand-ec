<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop | W stone</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #707070;
      --line: #dedbd5;
      --paper: #f7f5f0;
      --white: #ffffff;
      --deep: #2f3632;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .top-note {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      background: var(--deep);
      color: var(--white);
      font-size: 12px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 66px;
      padding: 0 28px;
      background: transparent;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 13px;
    }

    .nav-right {
      justify-content: flex-end;
    }

    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 400;
      white-space: nowrap;
    }

    .icon-button {
      border: 0;
      background: transparent;
      padding: 6px;
      cursor: pointer;
      color: var(--ink);
    }

    .shop-page {
      padding: 70px 28px 46px;
    }

    .shop-head {
      display: grid;
      gap: 24px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(56px, 9vw, 136px);
      line-height: 0.9;
      font-weight: 400;
    }

    .shop-actions {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 13px;
      padding: 0;
      margin-top: 8px;
    }

    .text-button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      gap: 18px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 0 12px;
      cursor: pointer;
      color: var(--ink);
      font-size: 14px;
    }

    .text-button:hover,
    .text-button:focus-visible,
    .text-button.active {
      border-color: var(--ink);
    }

    .text-button .button-icon {
      font-size: 24px;
      line-height: 1;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .product-card {
      min-width: 0;
      background: var(--paper);
    }

    .product-image {
      position: relative;
      aspect-ratio: 1 / 1.2;
      overflow: hidden;
      background: #e8e4dc;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      mix-blend-mode: multiply;
      transform: scale(1.02);
      transition: transform 280ms ease;
    }

    .product-card:hover img {
      transform: scale(1.06);
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 11px;
      text-transform: uppercase;
    }

    .wish {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
    }

    .product-info {
      display: grid;
      gap: 7px;
      min-height: 138px;
      padding: 15px;
      font-size: 14px;
    }

    .product-info strong {
      font-weight: 500;
    }

    .product-meta,
    .size-line {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .product-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
    }

    .add {
      border: 0;
      border-bottom: 1px solid transparent;
      background: transparent;
      padding: 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .add:hover,
    .add:focus-visible {
      border-bottom-color: var(--ink);
    }

    .pager {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 34px 0 12px;
      font-size: 13px;
    }

    .pager a:first-child {
      border-bottom: 1px solid var(--ink);
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      width: min(420px, 100vw);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--paper);
      border-left: 1px solid var(--line);
      transform: translateX(100%);
      transition: transform 240ms ease;
      box-shadow: -30px 0 60px rgba(0, 0, 0, 0.12);
    }

    .cart-drawer.open {
      transform: translateX(0);
    }

    .cart-head,
    .cart-foot {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-body {
      overflow: auto;
      padding: 20px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .cart-item img {
      width: 74px;
      height: 88px;
      object-fit: cover;
      background: #e8e4dc;
    }

    .cart-item p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .cart-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .subtotal {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      cursor: pointer;
      padding: 0 18px;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .control-drawer {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 60;
      width: min(470px, 100vw);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--white);
      transform: translateX(-100%);
      transition: transform 240ms ease;
    }

    .control-drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      position: relative;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #ececec;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .drawer-close {
      position: absolute;
      right: 22px;
      top: 50%;
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      cursor: pointer;
      transform: translateY(-50%);
      font-size: 42px;
      line-height: 1;
      font-weight: 200;
    }

    .drawer-body {
      overflow: auto;
    }

    .filter-row,
    .sort-row {
      width: 100%;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 0;
      border-bottom: 1px solid #ececec;
      background: transparent;
      padding: 0 26px;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
    }

    .filter-row.active,
    .sort-row.active {
      font-weight: 600;
    }

    .sort-row {
      justify-content: flex-start;
      gap: 14px;
    }

    .radio {
      width: 16px;
      height: 16px;
      border: 1px solid #777;
      border-radius: 50%;
    }

    .sort-row.active .radio {
      border: 5px solid var(--ink);
    }

    .drawer-foot {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid #ececec;
    }

    .drawer-foot.single {
      grid-template-columns: 1fr;
    }

    .outline-btn {
      min-height: 48px;
      border: 1px solid #9a9a9a;
      background: var(--white);
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .solid-btn {
      min-height: 48px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 1050px) {
      .product-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .site-header {
        grid-template-columns: auto 1fr auto;
        padding: 0 16px;
      }

      .nav-left a,
      .nav-right a {
        display: none;
      }

      .brand {
        justify-self: center;
        font-size: 24px;
      }

      .shop-page {
        padding: 48px 16px 36px;
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top-note">Taxes included / Complimentary delivery on orders over ¥30,000</div>

  <header class="site-header">
    <nav class="nav-left" aria-label="Primary navigation">
      <button class="icon-button" aria-label="メニュー">☰</button>
      <a href="W_STONE_SHOP.html">Shop</a>
    </nav>
    <a class="brand" href="W_STONE_EC.html">W stone</a>
    <nav class="nav-right" aria-label="Utility navigation">
      <a href="#">JP/JPY</a>
      <a href="#">Wishlist</a>
      <button class="icon-button" id="openCart" aria-label="カートを開く">Cart <span id="cartCount">0</span></button>
    </nav>
  </header>

  <main class="shop-page">
    <div class="shop-head">
      <h1>Products</h1>
      <div class="shop-actions">
        <button class="text-button" id="openSort">Sort <span class="button-icon">↕</span></button>
        <button class="text-button" id="openFilter">Filter <span class="button-icon">☷</span></button>
      </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <nav class="pager" aria-label="Pagination">
      <a href="#">1</a>
      <a href="#">2</a>
      <a href="#">3</a>
      <span>...</span>
      <a href="#">Next</a>
    </nav>
  </main>

  <aside class="cart-drawer" id="cartDrawer" aria-label="Cart">
    <div class="cart-head">
      <strong>Your cart</strong>
      <button class="icon-button" id="closeCart" aria-label="カートを閉じる">×</button>
    </div>
    <div class="cart-body" id="cartBody">
      <p>カートは空です。</p>
    </div>
    <div class="cart-foot">
      <div class="subtotal">
        <span>Subtotal</span>
        <strong id="subtotal">¥0</strong>
      </div>
      <a class="btn" href="W_STONE_CHECKOUT.html" style="width: 100%;">Checkout</a>
    </div>
  </aside>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside class="control-drawer" id="filterDrawer" aria-label="Filter">
    <div class="drawer-head">
      <h2>Filter</h2>
      <button class="drawer-close" data-close-drawer aria-label="Filterを閉じる">×</button>
    </div>
    <div class="drawer-body" id="filterOptions">
      <button class="filter-row" data-category="All">All <span>12</span></button>
      <button class="filter-row" data-category="Rings">Rings <span>4</span></button>
      <button class="filter-row" data-category="Necklaces">Necklaces <span>3</span></button>
      <button class="filter-row" data-category="Earrings">Earrings <span>3</span></button>
      <button class="filter-row" data-category="Bracelets">Bracelets <span>2</span></button>
      <button class="filter-row" data-category="New">New <span>4</span></button>
    </div>
    <div class="drawer-foot">
      <button class="outline-btn" id="clearFilters">Clear all</button>
      <button class="solid-btn" data-close-drawer>View items</button>
    </div>
  </aside>

  <aside class="control-drawer" id="sortDrawer" aria-label="Sort">
    <div class="drawer-head">
      <h2>Sort</h2>
      <button class="drawer-close" data-close-drawer aria-label="Sortを閉じる">×</button>
    </div>
    <div class="drawer-body" id="sortOptions">
      <button class="sort-row" data-sort="featured"><span class="radio"></span> Recommended</button>
      <button class="sort-row" data-sort="new"><span class="radio"></span> What's new</button>
      <button class="sort-row" data-sort="high"><span class="radio"></span> Price high to low</button>
      <button class="sort-row" data-sort="low"><span class="radio"></span> Price low to high</button>
      <button class="sort-row" data-sort="az"><span class="radio"></span> Alphabetically, A-Z</button>
    </div>
    <div class="drawer-foot single">
      <button class="solid-btn" data-close-drawer>View items</button>
    </div>
  </aside>

  <script>
    const products = [
      ["Lumen Signet Ring", "Rings", "Sterling silver", "Clear quartz", 42000, "52 54 56 58 60", "https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=900&q=85", "New"],
      ["Mica Oval Ring", "Rings", "Gold vermeil", "Moonstone", 52000, "50 52 54 56 58", "https://images.unsplash.com/photo-1603561596112-db1d9768c0bc?auto=format&fit=crop&w=900&q=85", ""],
      ["Deep Moss Ring", "Rings", "Sterling silver", "Green agate", 48000, "54 56 58 60 62", "https://images.unsplash.com/photo-1602751584552-8ba73aad10e1?auto=format&fit=crop&w=900&q=85", ""],
      ["Column Ring Slim", "Rings", "White gold", "White sapphire", 64000, "48 50 52 54 56", "https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=900&q=85", "New"],
      ["Trace Stone Necklace", "Necklaces", "White gold", "White sapphire", 68000, "16 inches 18 inches 20.5 inches", "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?auto=format&fit=crop&w=900&q=85", ""],
      ["Small Orbit Necklace", "Necklaces", "Gold vermeil", "Smoky quartz", 39000, "15 inches 17 inches 20.5 inches", "https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=900&q=85", ""],
      ["Narrow Chain Necklace", "Necklaces", "Sterling silver", "Onyx", 46000, "17 inches 20.5 inches 24.5 inches", "https://images.unsplash.com/photo-1506630448388-4e683c67ddb0?auto=format&fit=crop&w=900&q=85", ""],
      ["Still Drop Earrings", "Earrings", "Sterling silver", "Blue topaz", 36000, "Onesize", "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?auto=format&fit=crop&w=900&q=85", "New"],
      ["Pearl Stone Ear Cuff", "Earrings", "Gold vermeil", "Freshwater pearl", 28000, "Onesize", "https://images.unsplash.com/photo-1611652022419-a9419f74343d?auto=format&fit=crop&w=900&q=85", ""],
      ["Small Halo Hoops", "Earrings", "White gold", "Lab stone", 44000, "Onesize", "https://images.unsplash.com/photo-1602173574767-37ac01994b2a?auto=format&fit=crop&w=900&q=85", ""],
      ["Column Bracelet", "Bracelets", "Sterling silver", "Onyx", 44000, "6.5 inches 7.0 inches 7.7 inches", "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=900&q=85", ""],
      ["Ada Stone Bracelet", "Bracelets", "Gold vermeil", "Moonstone", 57000, "6.0 inches 6.5 inches 7.0 inches", "https://images.unsplash.com/photo-1602173574767-37ac01994b2a?auto=format&fit=crop&w=900&q=85", "New"]
    ].map(([name, category, material, stone, price, sizes, image, badge]) => ({
      name,
      category,
      material,
      stone,
      price,
      sizes,
      image,
      badge
    }));

    const state = {
      category: new URLSearchParams(window.location.search).get("category") || "All",
      sort: "featured",
      cart: []
    };

    const yen = new Intl.NumberFormat("ja-JP", {
      style: "currency",
      currency: "JPY",
      maximumFractionDigits: 0
    });

    const productGrid = document.getElementById("productGrid");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const filterDrawer = document.getElementById("filterDrawer");
    const sortDrawer = document.getElementById("sortDrawer");
    const cartDrawer = document.getElementById("cartDrawer");
    const cartBody = document.getElementById("cartBody");
    const cartCount = document.getElementById("cartCount");
    const subtotal = document.getElementById("subtotal");

    function renderProducts() {
      let visible = products.filter((product) => {
        if (state.category === "New") return Boolean(product.badge);
        return state.category === "All" || product.category === state.category;
      });

      if (state.sort === "low") visible = visible.sort((a, b) => a.price - b.price);
      if (state.sort === "high") visible = visible.sort((a, b) => b.price - a.price);
      if (state.sort === "az") visible = visible.sort((a, b) => a.name.localeCompare(b.name));
      if (state.sort === "new") visible = visible.sort((a, b) => Number(Boolean(b.badge)) - Number(Boolean(a.badge)));

      productGrid.innerHTML = visible.map((product) => `
        <article class="product-card">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}">
            ${product.badge ? `<span class="badge">${product.badge}</span>` : ""}
            <button class="wish" aria-label="${product.name}をウィッシュリストに追加">♡</button>
          </div>
          <div class="product-info">
            <strong>${product.name}</strong>
            <span class="product-meta">${product.category} / ${product.material} / ${product.stone}</span>
            <span class="size-line">AVAILABLE IN SIZES ${product.sizes}</span>
            <div class="product-row">
              <span>${yen.format(product.price)}</span>
              <button class="add" data-name="${product.name}">Add to cart</button>
            </div>
          </div>
        </article>
      `).join("");

      document.querySelectorAll(".add").forEach((button) => {
        button.addEventListener("click", () => {
          addToCart(products.find((product) => product.name === button.dataset.name));
        });
      });
    }

    function renderFilters() {
      document.querySelectorAll("#filterOptions button").forEach((button) => {
        button.classList.toggle("active", button.dataset.category === state.category);
      });
    }

    function renderSort() {
      document.querySelectorAll("#sortOptions button").forEach((button) => {
        button.classList.toggle("active", button.dataset.sort === state.sort);
      });
    }

    function openDrawer(drawer) {
      drawerOverlay.classList.add("open");
      drawer.classList.add("open");
    }

    function closeDrawers() {
      drawerOverlay.classList.remove("open");
      filterDrawer.classList.remove("open");
      sortDrawer.classList.remove("open");
    }

    function addToCart(product) {
      state.cart.push(product);
      renderCart();
      cartDrawer.classList.add("open");
    }

    function renderCart() {
      cartCount.textContent = state.cart.length;
      const total = state.cart.reduce((sum, product) => sum + product.price, 0);
      subtotal.textContent = yen.format(total);

      if (!state.cart.length) {
        cartBody.innerHTML = "<p>カートは空です。</p>";
        return;
      }

      cartBody.innerHTML = state.cart.map((product) => `
        <div class="cart-item">
          <img src="${product.image}" alt="${product.name}">
          <div>
            <strong>${product.name}</strong>
            <p>${product.stone}</p>
          </div>
          <span>${yen.format(product.price)}</span>
        </div>
      `).join("");
    }

    document.getElementById("openFilter").addEventListener("click", () => {
      openDrawer(filterDrawer);
    });

    document.getElementById("openSort").addEventListener("click", () => {
      openDrawer(sortDrawer);
    });

    document.querySelectorAll("[data-close-drawer]").forEach((button) => {
      button.addEventListener("click", closeDrawers);
    });

    drawerOverlay.addEventListener("click", closeDrawers);

    document.getElementById("filterOptions").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      state.category = button.dataset.category;
      renderFilters();
      renderProducts();
    });

    document.getElementById("clearFilters").addEventListener("click", () => {
      state.category = "All";
      renderFilters();
      renderProducts();
    });

    document.getElementById("sortOptions").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      state.sort = button.dataset.sort;
      renderSort();
      renderProducts();
    });

    document.getElementById("openCart").addEventListener("click", () => {
      cartDrawer.classList.add("open");
    });

    document.getElementById("closeCart").addEventListener("click", () => {
      cartDrawer.classList.remove("open");
    });

    renderFilters();
    renderSort();
    renderProducts();
  </script>
</body>
</html>
