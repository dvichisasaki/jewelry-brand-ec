<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout | W stone</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #707070;
      --line: #dedbd5;
      --paper: #f7f5f0;
      --white: #ffffff;
      --deep: #2f3632;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--white);
      font-family: "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .checkout-header {
      height: 86px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 34px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
    }

    .brand {
      grid-column: 2;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
      font-weight: 400;
    }

    .bag {
      justify-self: end;
      border: 0;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
    }

    .checkout-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      min-height: calc(100vh - 86px);
    }

    .checkout-main {
      padding: 44px clamp(24px, 7vw, 132px) 70px;
    }

    .summary {
      padding: 44px clamp(24px, 6vw, 92px);
      border-left: 1px solid var(--line);
      background: #fbfaf7;
    }

    .quick-pay {
      text-align: center;
    }

    .quick-pay p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pay-button {
      min-height: 58px;
      border: 0;
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
    }

    .shop-pay {
      background: #5433eb;
    }

    .g-pay {
      background: #050505;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin: 28px 0 14px;
    }

    h1,
    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 700;
    }

    .login-link {
      border-bottom: 1px solid var(--ink);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      position: relative;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    input,
    select {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 22px 14px 8px;
      border-radius: 0;
      color: var(--ink);
    }

    input:focus,
    select:focus {
      outline: 2px solid var(--ink);
      outline-offset: -2px;
    }

    label {
      position: absolute;
      top: 8px;
      left: 14px;
      color: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }

    .check-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0 30px;
      font-size: 14px;
    }

    .check-line input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--ink);
    }

    .shipping-box {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .continue {
      width: 100%;
      min-height: 58px;
      margin-top: 22px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      cursor: pointer;
      font-weight: 700;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .summary-item {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 26px;
    }

    .item-image {
      position: relative;
      width: 74px;
      height: 74px;
      background: #e8e4dc;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
    }

    .qty {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: var(--white);
      font-size: 12px;
    }

    .item-title {
      font-weight: 600;
    }

    .item-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .coupon {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 18px 0 28px;
    }

    .coupon input {
      min-height: 58px;
      padding: 0 14px;
    }

    .coupon button {
      min-width: 82px;
      border: 1px solid var(--line);
      background: #f0efec;
      color: var(--muted);
      cursor: pointer;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 15px;
    }

    .total-row strong {
      color: var(--ink);
      font-weight: 500;
    }

    .grand-total {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-top: 24px;
      color: var(--ink);
      font-size: 21px;
      font-weight: 700;
    }

    .grand-total span:last-child {
      font-size: 28px;
    }

    .currency {
      margin-right: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    @media (max-width: 900px) {
      .checkout-shell {
        grid-template-columns: 1fr;
      }

      .summary {
        order: -1;
        border-left: 0;
        border-bottom: 1px solid var(--line);
      }

      .checkout-main,
      .summary {
        padding: 30px 18px;
      }
    }

    @media (max-width: 560px) {
      .checkout-header {
        height: 72px;
        padding: 0 18px;
      }

      .brand {
        font-size: 25px;
      }

      .quick-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="checkout-header">
    <a class="brand" href="W_STONE_EC.html">W stone</a>
    <button class="bag" aria-label="Cart">⌑</button>
  </header>

  <main class="checkout-shell">
    <section class="checkout-main">
      <div class="quick-pay">
        <p>かんたん決済</p>
        <div class="quick-grid">
          <button class="pay-button shop-pay">shop</button>
          <button class="pay-button g-pay">G Pay</button>
        </div>
      </div>

      <div class="divider">または</div>

      <div class="section-head">
        <h1>連絡先</h1>
        <a class="login-link" href="#">ログイン</a>
      </div>
      <div class="field full">
        <label for="contact">メールアドレスまたは携帯電話番号</label>
        <input id="contact" type="text" autocomplete="email">
      </div>
      <label class="check-line">
        <input type="checkbox" checked>
        <span>お得な情報をメールで受け取る</span>
      </label>

      <div class="section-head">
        <h2>お届け先</h2>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label for="country">国 / 地域</label>
          <select id="country">
            <option>日本</option>
            <option>United States</option>
            <option>Norway</option>
          </select>
        </div>
        <div class="field">
          <label for="family">姓</label>
          <input id="family" type="text" autocomplete="family-name">
        </div>
        <div class="field">
          <label for="given">名</label>
          <input id="given" type="text" autocomplete="given-name">
        </div>
        <div class="field">
          <label for="postal">郵便番号</label>
          <input id="postal" type="text" autocomplete="postal-code">
        </div>
        <div class="field">
          <label for="prefecture">都道府県</label>
          <select id="prefecture">
            <option>東京都</option>
            <option>神奈川県</option>
            <option>大阪府</option>
            <option>三重県</option>
            <option>福岡県</option>
          </select>
        </div>
        <div class="field full">
          <label for="city">市区町村</label>
          <input id="city" type="text" autocomplete="address-level2">
        </div>
        <div class="field full">
          <label for="address">住所</label>
          <input id="address" type="text" autocomplete="street-address">
        </div>
        <div class="field full">
          <label for="building">建物名、部屋番号など</label>
          <input id="building" type="text">
        </div>
        <div class="field full">
          <label for="phone">電話番号</label>
          <input id="phone" type="tel" autocomplete="tel">
        </div>
      </div>

      <div class="section-head">
        <h2>配送方法</h2>
      </div>
      <div class="shipping-box">
        <span>お届け先住所を入力すると、配送方法が表示されます。</span>
      </div>

      <button class="continue">配送方法へ進む</button>
      <a class="back-link" href="W_STONE_SHOP.html">カートに戻る</a>
    </section>

    <aside class="summary">
      <div class="summary-item">
        <div class="item-image">
          <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=300&q=85" alt="Lumen Signet Ring">
          <span class="qty">1</span>
        </div>
        <div>
          <div class="item-title">Lumen Signet Ring</div>
          <div class="item-meta">52 / Clear quartz</div>
        </div>
        <strong>¥42,000</strong>
      </div>

      <form class="coupon">
        <input type="text" placeholder="クーポンコード">
        <button type="submit">適用</button>
      </form>

      <div class="total-row">
        <span>小計</span>
        <strong>¥42,000</strong>
      </div>
      <div class="total-row">
        <span>送料</span>
        <span>お届け先住所を入力する</span>
      </div>
      <div class="grand-total">
        <span>合計</span>
        <span><span class="currency">JPY</span>¥42,000</span>
      </div>
    </aside>
  </main>
</body>
</html>
